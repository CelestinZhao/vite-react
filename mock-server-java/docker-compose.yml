# 用法：
#   docker compose up -d          # 后台启动
#   docker compose logs -f        # 查看日志
#   docker compose down           # 停止
#
# 首次启动会构建镜像（约 2-3 分钟），后续秒级启动。
# 本地无需安装 Java 或 Maven！

services:
  mock-server-java:
    build: .
    image: mock-server-java:latest
    container_name: mock-server-java
    ports:
      - "3001:3001"
    volumes:
      # SQLite 数据持久化到宿主机
      - ./data:/app/data
      # 本地密钥配置挂载（如果存在）
      - ./src/main/resources/application-local.yml:/app/config/application-local.yml:ro
    environment:
      # 如果不想用文件挂载，也可以在这里注入环境变量
      # - HUNYUAN_API_KEY=sk-xxx
      - SPRING_CONFIG_ADDITIONAL_LOCATION=file:/app/config/
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
