<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + React</title>
    <!-- tdesign-react 样式：UMD 包不含 CSS，必须单独引入 -->
    <link rel="stylesheet" href="https://unpkg.com/tdesign-react/dist/tdesign.min.css" />
    <!-- 首屏 loading 样式：内联以避免任何网络请求，保证第一时间可见 -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #f5f7fa;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #root {
        min-height: 100vh;
      }
      .app-first-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        color: #0052d9;
      }
      .app-first-loading__spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(0, 82, 217, 0.15);
        border-top-color: #0052d9;
        border-radius: 50%;
        animation: app-first-loading-spin 0.8s linear infinite;
      }
      .app-first-loading__text {
        font-size: 14px;
        color: #606266;
        letter-spacing: 1px;
      }
      @keyframes app-first-loading-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <!--
      外部依赖 CDN：
      1. 统一挂到 <head>，与 Vite 打包后注入的 module 脚本位置保持一致
      2. 使用 defer：并行下载、不阻塞 HTML 解析、严格按声明顺序执行
         由于规范保证 defer 脚本按项顺序执行，react → react-dom → tdesign 的依赖顺序不变
         且 module 脚本总在所有 defer 脚本之后执行，业务代码运行时全部全局变量已就绪
    -->
    <script defer crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script defer crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script defer src="https://unpkg.com/tdesign-react/dist/tdesign.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
    <script defer src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- 业务入口：Vite 构建时会自动将其注入到此处后，执行时机紧随所有 defer 之后 -->
    <script type="module" src="/src/index.js"></script>
  </head>
  <body>
    <div id="root">
      <!-- 首屏占位：React 渲染完成后会被自动替换 -->
      <div class="app-first-loading">
        <div class="app-first-loading__spinner"></div>
        <div class="app-first-loading__text">加载中...</div>
      </div>
    </div>
  </body>
</html>
